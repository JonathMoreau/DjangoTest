openapi: 3.0.3
info:
  title: Orders API
  version: 1.0.0
  description: |
    API Machine-to-Machine pour la gestion des commandes.
    Les appels sont proteges par un jeton Bearer au format `<client_id>.<secret>`.
servers:
  - url: /
paths:
  /api/orders/openapi.yaml:
    get:
      summary: Recuperer la specification OpenAPI des commandes
      operationId: getOrdersOpenApi
      responses:
        "200":
          description: Specification OpenAPI au format YAML
          content:
            application/yaml:
              schema:
                type: string
  /api/orders/:
    get:
      summary: Lister les commandes
      operationId: listOrders
      security:
        - bearerAuth: [orders:read]
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Liste des commandes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Creer une commande
      operationId: createOrder
      security:
        - bearerAuth: [orders:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: Commande creee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/orders/{order_id}/:
    get:
      summary: Recuperer une commande
      operationId: getOrder
      security:
        - bearerAuth: [orders:read]
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detail d'une commande
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Mettre a jour une commande
      operationId: updateOrder
      security:
        - bearerAuth: [orders:write]
      parameters:
        - in: path
          name: order_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Commande mise a jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ApiClientToken
      description: |
        Jeton Bearer emis pour un client API.
        Le jeton doit porter les scopes `orders:read` et/ou `orders:write`.
  schemas:
    OrderCustomer:
      type: object
      required: [id, username, email]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
    OrderLine:
      type: object
      required: [id, product_id, product_name, sku, unit_price, quantity, line_total]
      properties:
        id:
          type: integer
        product_id:
          type: integer
        product_name:
          type: string
        sku:
          type: string
        unit_price:
          type: string
        quantity:
          type: integer
        line_total:
          type: string
    Order:
      type: object
      required: [id, number, customer, status, notes, total_quantity, total_amount, created_at, updated_at, lines]
      properties:
        id:
          type: integer
        number:
          type: string
        customer:
          $ref: "#/components/schemas/OrderCustomer"
        status:
          type: string
          enum: [draft, submitted, preparing, shipped, completed, cancelled]
        notes:
          type: string
        total_quantity:
          type: integer
        total_amount:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        lines:
          type: array
          items:
            $ref: "#/components/schemas/OrderLine"
    OrderCreateLine:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: integer
        quantity:
          type: integer
          minimum: 1
    OrderCreate:
      type: object
      required: [customer_id, lines]
      properties:
        customer_id:
          type: integer
        status:
          type: string
          enum: [draft, submitted, preparing, shipped, completed, cancelled]
        notes:
          type: string
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderCreateLine"
    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [draft, submitted, preparing, shipped, completed, cancelled]
        notes:
          type: string
    OrderListResponse:
      type: object
      required: [count, items]
      properties:
        count:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Order"
    Error:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
  responses:
    BadRequest:
      description: Requete invalide
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentification requise
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Scope insuffisant
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
