<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ domain.title }} - API Docs</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", sans-serif;
            background: #f6f7fb;
            color: #162033;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(84, 125, 255, 0.14), transparent 30%),
                linear-gradient(180deg, #f9fbff 0%, #eef2f9 100%);
        }

        .page-header {
            padding: 2rem 1.5rem 1rem;
        }

        .page-header a {
            color: #0a58ca;
            font-weight: 600;
            text-decoration: none;
        }

        .page-header h1 {
            margin: 0.5rem 0;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .page-header p {
            margin: 0;
            max-width: 44rem;
            line-height: 1.5;
            color: #43506a;
        }

        .nav {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .nav a.active {
            color: #162033;
        }

        .docs-shell {
            margin: 0 1rem 1rem;
            border: 1px solid rgba(22, 32, 51, 0.08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(22, 32, 51, 0.08);
            background: #ffffff;
        }

        redoc {
            display: block;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <a href="{% url 'api_docs:index' %}">Retour a la liste des domaines</a>
        <h1>{{ domain.title }}</h1>
        <p>
            {{ domain.description }}
            Specification brute :
            <a href="{{ domain.spec_url }}">{{ domain.spec_url }}</a>.
        </p>

        <nav class="nav" aria-label="Domaines documentes">
            {% for item in domains %}
                <a
                    href="{{ item.docs_url }}"
                    {% if item.slug == domain.slug %}class="active"{% endif %}
                >
                    {{ item.title }}
                </a>
            {% endfor %}
        </nav>
    </header>

    <main class="docs-shell">
        <redoc spec-url="{{ domain.spec_url }}"></redoc>
    </main>

    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
</body>
</html>
